---
layout: archive
permalink: /tags/
title: "Browse by Tag"
author_profile: true
---

{% include base_path %}
{% include group-by-array collection=site.posts field="tags" %}

<div class="tag-cloud">
  {% for tag in group_names %}
    {% assign posts = group_items[forloop.index0] %}
    <a href="{{ base_path }}/tags/{{ tag | slugify }}/" class="tech-chip tag-cloud__item">
      {{ tag }}
      <span class="tag-cloud__count">{{ posts | size }}</span>
    </a>
  {% endfor %}
</div>
